name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - 'refactor/**'
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Opt the reusable JS actions (checkout, setup-node, upload-pages-artifact,
# deploy-pages) into the Node.js 24 runtime ahead of GitHub's June 2026
# deadline. The actions themselves still pin to @v4 because no v5 exists yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (includes static/frameworks/*.json validation)
        run: npm test

      - name: Type check
        run: npm run check

      - name: Build for Pages (BASE_PATH=/snowflake)
        run: npm run build:pages

      - name: Copy index.html to 404.html for SPA fallback
        run: cp build/index.html build/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
